<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostPurchasePro — Post-Purchase Upsells</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Crect x='6' y='12' width='20' height='17' rx='3' fill='%238b5cf6' opacity='.15' stroke='%23a78bfa' stroke-width='1.8'/%3E%3Cpath d='M11 12V9a5 5 0 0110 0v3' stroke='%23a78bfa' stroke-width='1.8' stroke-linecap='round'/%3E%3Cpath d='M16 21V15M13.5 17.5L16 15l2.5 2.5' stroke='%2322c55e' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Brand Colors - Indigo/Purple */
      --color-primary: #8b5cf6;
      --color-primary-hover: #7c3aed;
      --color-primary-light: #a78bfa;
      --color-primary-subtle: rgba(139, 92, 246, 0.12);

      /* Status Colors */
      --color-success: #22c55e;
      --color-success-subtle: rgba(34, 197, 94, 0.12);
      --color-danger: #ef4444;
      --color-danger-subtle: rgba(239, 68, 68, 0.12);
      --color-warning: #f59e0b;
      --color-warning-subtle: rgba(245, 158, 11, 0.12);

      /* Neutral */
      --color-bg: #0f0f14;
      --color-surface: #18181b;
      --color-surface-elevated: #1f1f28;
      --color-border: #27272a;
      --color-border-subtle: #1f1f28;
      --color-text: #fafafa;
      --color-text-secondary: #e5e5e5;
      --color-text-muted: #a1a1aa;
      --color-text-faint: #71717a;
      --color-text-dim: #52525b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--color-bg); color: var(--color-text-secondary); min-height: 100vh; }

    /* Layout */
    .app-layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 240px; background: var(--color-surface); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--color-border); }
    .logo { font-size: 18px; font-weight: 700; color: var(--color-primary-light); display: flex; align-items: center; gap: 10px; }
    .logo svg { color: var(--color-primary); }
    .nav { padding: 12px 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: var(--color-text-muted); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border-right: 2px solid transparent; }
    .nav-item:hover { background: var(--color-border-subtle); color: var(--color-text-secondary); }
    .nav-item.active { background: var(--color-border-subtle); color: var(--color-primary-light); border-right-color: var(--color-primary); }
    .nav-item svg { width: 18px; height: 18px; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; color: var(--color-primary-light); }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--color-border); }
    .store-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-faint); }
    .store-info svg { width: 14px; height: 14px; opacity: 0.6; }

    /* Main Content */
    .main-content { flex: 1; margin-left: 240px; padding: 32px; }

    /* Empty state */
    .empty-state { text-align: center; padding: 80px 40px; }
    .empty-state svg { width: 64px; height: 64px; margin: 0 auto 16px; display: block; opacity: 0.3; }
    .empty-state h3 { font-size: 20px; font-weight: 600; color: var(--color-text); margin-bottom: 8px; }
    .empty-state p { color: var(--color-text-faint); font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/dist/bundle.js"></script>
</body>
</html>
