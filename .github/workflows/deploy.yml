name: Deploy to Railway

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
        run: |
          echo "Detecting available Railway services..."
          ERROR_OUTPUT=$(railway up 2>&1)
          echo "Railway output: $ERROR_OUTPUT"
          SERVICE_NAME=$(echo "$ERROR_OUTPUT" | python3 -c 'import sys, re; data = sys.stdin.read(); m = re.search(r"Multiple services found: \[([^\]]+)\]", data); print(m.group(1).split(",")[0].strip()) if m else None')
          if [ -z "$SERVICE_NAME" ]; then
            for SVC in app web api main; do
              echo "Trying service: $SVC"
              railway up --service "$SVC" && exit 0
            done
            echo "Could not determine service name."
            exit 1
          fi
          echo "Detected service: $SERVICE_NAME"
          railway up --service "$SERVICE_NAME"