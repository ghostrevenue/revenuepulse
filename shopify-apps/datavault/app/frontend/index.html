<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataVault - Customer Analytics</title>
  <script src="https://cdn.shopify.com/s/assets/applications/storefront-34d8b23851e31f5a0da53b06006b4375.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e4e4e7;
      min-height: 100vh;
    }
    #root { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #0f0f1a;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a3e;
    }
    .logo {
      padding: 0 20px 20px;
      border-bottom: 1px solid #2a2a3e;
      margin-bottom: 20px;
    }
    .logo h1 {
      font-size: 24px;
      color: #6366f1;
      font-weight: 700;
    }
    .logo span { font-size: 12px; color: #71717a; }
    
    .nav-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #a1a1aa;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: #1a1a2e; color: #e4e4e7; }
    .nav-item.active {
      background: #1a1a2e;
      color: #6366f1;
      border-left-color: #6366f1;
    }
    .nav-icon { font-size: 18px; }
    
    /* Main Content */
    .main {
      flex: 1;
      padding: 30px 40px;
      overflow-y: auto;
    }
    .header {
      margin-bottom: 30px;
    }
    .header h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .header p { color: #71717a; }
    
    /* Cards */
    .card {
      background: #16162a;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #2a2a3e;
    }
    .card-title {
      font-size: 14px;
      color: #71717a;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-value {
      font-size: 32px;
      font-weight: 700;
      color: #e4e4e7;
    }
    .card-sub { font-size: 14px; color: #71717a; margin-top: 4px; }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    /* Table */
    .table-container { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #2a2a3e;
    }
    th {
      color: #71717a;
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
    }
    tr:hover td { background: #1a1a2e; }
    
    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary {
      background: #2a2a3e;
      color: #e4e4e7;
    }
    .btn-secondary:hover { background: #3a3a4e; }
    
    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #a1a1aa;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e4e4e7;
      font-size: 14px;
    }
    .form-input:focus {
      outline: none;
      border-color: #6366f1;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: #0f0f1a;
      padding: 4px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #71717a;
      transition: all 0.2s;
    }
    .tab.active {
      background: #6366f1;
      color: white;
    }
    .tab:hover:not(.active) { color: #e4e4e7; }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal {
      background: #16162a;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid #2a2a3e;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 20px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      color: #71717a;
      font-size: 24px;
      cursor: pointer;
    }
    .modal-close:hover { color: #e4e4e7; }
    
    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    
    /* Segment Rule Builder */
    .rule-builder { background: #0f0f1a; border-radius: 8px; padding: 16px; }
    .rule-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .rule-row select, .rule-row input {
      flex: 1;
      padding: 8px 12px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #e4e4e7;
    }
    
    /* Progress bars */
    .progress-bar {
      height: 8px;
      background: #2a2a3e;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .progress-fill.green { background: #22c55e; }
    .progress-fill.yellow { background: #eab308; }
    .progress-fill.red { background: #ef4444; }
    
    /* Badge */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge.green { background: rgba(34,197,94,0.2); color: #22c55e; }
    .badge.yellow { background: rgba(234,179,8,0.2); color: #eab308; }
    .badge.red { background: rgba(239,68,68,0.2); color: #ef4444; }
    .badge.blue { background: rgba(99,102,241,0.2); color: #6366f1; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: #71717a; }
    
    /* Search */
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .search-input {
      flex: 1;
      padding: 10px 16px;
      background: #16162a;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e4e4e7;
      font-size: 14px;
    }
    
    /* Cohort Table */
    .cohort-table { overflow-x: auto; }
    .cohort-cell {
      padding: 8px;
      text-align: center;
      font-size: 13px;
      color: #71717a;
    }
    .cohort-cell.high { background: rgba(34,197,94,0.2); color: #22c55e; }
    .cohort-cell.medium { background: rgba(234,179,8,0.2); color: #eab308; }
    .cohort-cell.low { background: rgba(239,68,68,0.2); color: #ef4444; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="src/index.jsx"></script>
</body>
</html>
