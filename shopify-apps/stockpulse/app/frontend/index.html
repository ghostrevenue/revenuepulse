<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPulse - Inventory Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0f1113; color: #e5e5e5; min-height: 100vh; }
    
    .app-layout { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 240px; background: #18181b; border-right: 1px solid #27272a; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #27272a; }
    .logo { font-size: 20px; font-weight: 700; color: #22c55e; display: flex; align-items: center; gap: 8px; }
    .logo svg { width: 24px; height: 24px; }
    .nav { padding: 12px 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #a1a1aa; text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .nav-item:hover { background: #27272a; color: #e5e5e5; }
    .nav-item.active { background: #27272a; color: #22c55e; border-right: 2px solid #22c55e; }
    .nav-item svg { width: 20px; height: 20px; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid #27272a; font-size: 12px; color: #71717a; }
    
    /* Main Content */
    .main-content { flex: 1; margin-left: 240px; padding: 32px; }
    .page-header { margin-bottom: 32px; }
    .page-title { font-size: 28px; font-weight: 700; color: #fafafa; margin-bottom: 8px; }
    .page-subtitle { color: #71717a; font-size: 14px; }
    
    /* Cards */
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 600; color: #fafafa; }
    .card-value { font-size: 32px; font-weight: 700; color: #22c55e; }
    .card-subtitle { font-size: 13px; color: #71717a; margin-top: 4px; }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 13px; color: #71717a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 28px; font-weight: 700; color: #fafafa; }
    .stat-value.warning { color: #f59e0b; }
    .stat-value.danger { color: #ef4444; }
    .stat-change { font-size: 12px; margin-top: 4px; }
    .stat-change.up { color: #22c55e; }
    .stat-change.down { color: #ef4444; }
    
    /* Tables */
    .table { width: 100%; border-collapse: collapse; }
    .table th { text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; color: #71717a; text-transform: uppercase; border-bottom: 1px solid #27272a; }
    .table td { padding: 16px; font-size: 14px; border-bottom: 1px solid #27272a; }
    .table tr:hover { background: #27272a; }
    
    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
    .btn-primary { background: #22c55e; color: #000; }
    .btn-primary:hover { background: #16a34a; }
    .btn-secondary { background: #27272a; color: #e5e5e5; }
    .btn-secondary:hover { background: #3f3f46; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    
    /* Forms */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #a1a1aa; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 14px; background: #0f1113; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; font-size: 14px; }
    .form-input:focus { outline: none; border-color: #22c55e; }
    .form-select { width: 100%; padding: 10px 14px; background: #0f1113; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; font-size: 14px; }
    
    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    .badge-success { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .badge-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    
    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    
    /* Flex utilities */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    
    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: #71717a; }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
    
    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: #71717a; }
    
    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid #27272a; }
    .tab { padding: 12px 20px; font-size: 14px; font-weight: 500; color: #71717a; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: #e5e5e5; }
    .tab.active { color: #22c55e; border-bottom-color: #22c55e; }
    
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .modal { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; width: 100%; max-width: 500px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { background: none; border: none; color: #71717a; cursor: pointer; font-size: 24px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module" src="src/index.jsx"></script>
</body>
</html>
